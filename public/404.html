<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Auto Froler</title>
    <script>
      // GitHub Pages BrowserRouter redirect trick
      // Stores the current path and redirects to index.html
      var path = window.location.pathname + window.location.search;
      sessionStorage.setItem("redirect", path);
      window.location.replace("/froler-website/");
    </script>
  </head>
  <body></body>
</html>
